<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InFinity | Portal de Acesso</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --primary: #00df9a; 
            --secondary: #2a5ff0; 
            --bg: #050816; 
            --card: #ffffff;
            --text: #1e293b; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .login-card { 
            background: var(--card); 
            padding: 35px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
        }

        .logo { width: 160px; margin-bottom: 20px; }
        
        h2 { color: var(--secondary); margin: 0; font-weight: 800; }
        p.subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--secondary); margin-bottom: 4px; padding-left: 5px; }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            font-size: 0.9rem;
            background: #f8fafc;
        }

        input:focus { outline: none; border-color: var(--secondary); background: #fff; }

        #registration-fields { 
            display: none; 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 2px dashed #e2e8f0;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-auth { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--secondary), #4f46e5); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-auth:hover { transform: scale(1.02); filter: brightness(1.1); }
        .footer-note { font-size: 0.7rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo-horizontal.jpg" alt="InFinity Logo" class="logo">
        <h2 id="title">Welcome!</h2>
        <p id="subtitle" class="subtitle">Acesse sua jornada bilíngue.</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail Institucional">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Sua senha">
        </div>

        <div id="registration-fields">
            <div class="input-group">
                <input type="text" id="nomeCompleto" placeholder="Nome Completo">
            </div>
            
            <div class="input-group">
                <label>Modalidade</label>
                <select id="modalidade">
                    <option value="Integrado">Integrado</option>
                    <option value="Subsequente">Subsequente</option>
                    <option value="Superior">Superior</option>
                    <option value="Visitante">Sou Visitante (Externo)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Curso</label>
                <select id="curso">
                    <option value="Informática">Informática</option>
                    <option value="Eletrotécnica">Eletrotécnica</option>
                    <option value="Edificações">Edificações</option>
                    <option value="Segurança no Trabalho">Segurança no Trabalho</option>
                    <option value="Engenharia Civil">Engenharia Civil</option>
                    <option value="Visitante">Visitante / Nenhum</option>
                </select>
            </div>

            <div class="input-group">
                <label>Ano ou Período</label>
                <select id="periodo">
                    <option value="1º Ano">1º Ano</option>
                    <option value="2º Ano">2º Ano</option>
                    <option value="3º Ano">3º Ano</option>
                    <option value="1º Período">1º Período</option>
                    <option value="2º Período">2º Período</option>
                    <option value="Turma de Engenharia">Engenharia Civil</option>
                    <option value="Visitante">Visitante / Nenhum</option>
                </select>
            </div>

            <div class="input-group">
                <label>Turma</label>
                <select id="turma">
                    <option value="Única">Única (Aluno IF)</option>
                    <option value="Turma A">Turma A</option>
                    <option value="Turma B">Turma B</option>
                    <option value="Visitante">Visitante / Externo</option>
                </select>
            </div>
        </div>
        
        <button class="btn-auth" id="btn-main" onclick="handleAuth()">ENTRAR</button>
        <p class="footer-note">Se for seu primeiro acesso, os campos de cadastro aparecerão automaticamente.</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isRegistering = false;

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                alert("Preencha o e-mail e uma senha com no mínimo 6 dígitos.");
                return;
            }

            if (!isRegistering) {
                // Tenta Login
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    window.location.href = "index.html";
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        activateRegistration();
                    } else {
                        alert("Acesso negado: Verifique seus dados.");
                    }
                }
            } else {
                // Tenta Cadastro
                const nome = document.getElementById('nomeCompleto').value.trim();
                if (!nome) { alert("Digite seu nome completo."); return; }

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Salva Perfil Detalhado
                    await db.collection("usuarios").doc(user.uid).set({
                        nome: nome,
                        email: email,
                        modalidade: document.getElementById('modalidade').value,
                        curso: document.getElementById('curso').value,
                        periodo: document.getElementById('periodo').value,
                        turma: document.getElementById('turma').value,
                        isAdmin: email === "jarbas.lima@ifpb.edu.br",
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert("Bem-vindo à InFinity!");
                    window.location.href = "index.html";
                } catch (error) {
                    alert("Erro ao criar conta: " + error.message);
                }
            }
        }

        function activateRegistration() {
            isRegistering = true;
            document.getElementById('registration-fields').style.display = 'block';
            document.getElementById('title').innerText = "Novo Cadastro";
            document.getElementById('subtitle').innerText = "Preencha seus dados acadêmicos.";
            document.getElementById('btn-main').innerText = "CONCLUIR CADASTRO";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
