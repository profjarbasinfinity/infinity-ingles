<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 12</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --primary: #2f9e41; 
            --secondary: #2a5ff0; 
            --bg: #f8fafc; 
            --text: #1e293b; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }

        .logo-img { width: 160px; margin-bottom: 20px; }

        .card { 
            background: white; 
            border-radius: 24px; 
            padding: 30px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            border: 1px solid #e2e8f0;
        }

        .mission-id { color: var(--primary); font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; }
        .phrase-box { 
            background: #f1f5f9; 
            padding: 20px; 
            border-radius: 16px; 
            margin: 20px 0; 
            font-size: 1.4rem; 
            font-weight: 600; 
            color: var(--secondary);
            border: 2px dashed #cbd5e1;
        }

        .btn-mic { 
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: var(--secondary); color: white; font-size: 2rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(42, 95, 240, 0.3);
        }
        .btn-mic.recording { background: #ef4444; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #status-msg { margin-top: 15px; font-weight: 600; min-height: 24px; }
        .transcript { font-style: italic; color: #64748b; margin-top: 10px; font-size: 0.9rem; }

        .btn-next { 
            display: none; width: 100%; padding: 18px; border: none; border-radius: 12px; 
            background: var(--primary); color: white; font-weight: 800; 
            cursor: pointer; font-size: 1rem; margin-top: 25px; 
        }

        #success-overlay {
            display: none; position: fixed; inset: 0; background: white;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <img src="logo-horizontal.jpg" alt="InFinity Logo" class="logo-img">

    <div class="card" id="main-card">
        <div class="mission-id">Missão 12: Speaking Skills</div>
        <p>Pronuncie a frase abaixo para o sistema:</p>
        
        <div class="phrase-box" id="target-phrase">I think that things will change.</div>

        <button class="btn-mic" id="mic-btn" onclick="startRecognition()">🎤</button>
        
        <div id="status-msg">Clique no microfone para falar</div>
        <div class="transcript" id="transcript-text"></div>

        <button id="next-btn" class="btn-next" onclick="saveProgress()">CONCLUIR MISSÃO 12</button>
    </div>

    <div id="success-overlay">
        <h1 style="font-size: 4rem; margin: 0;">🎯</h1>
        <h2 style="color: var(--primary);">EXCELENTE PRONÚNCIA!</h2>
        <p>Você dominou o som do 'TH' nesta frase.</p>
        <button class="btn-next" style="display: block; width: 200px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- SEGURANÇA E MODO DEUS ---
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            
            // MODALIDADE MESTRE: Professor Jarbas pula a trava
            if (user.email === "jarbas.lima@ifpb.edu.br") {
                console.log("Admin Mode: Access Granted");
                return; 
            }

            // Alunos: Verificam a Missão 11
            const prevDoc = await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m11").get();
            if (!prevDoc.exists) {
                alert("Você precisa completar a Missão 11 primeiro!");
                window.location.href = 'index.html';
            }
        });

        // --- LÓGICA DE RECONHECIMENTO DE VOZ ---
        const target = "i think that things will change";
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        function startRecognition() {
            recognition.start();
            document.getElementById('mic-btn').classList.add('recording');
            document.getElementById('status-msg').innerText = "Ouvindo...";
        }

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript.toLowerCase().replace(/[.,!]/g, "");
            document.getElementById('mic-btn').classList.remove('recording');
            document.getElementById('transcript-text').innerText = `Você disse: "${result}"`;

            if (result === target) {
                document.getElementById('status-msg').innerText = "✅ Perfeito!";
                document.getElementById('status-msg').style.color = "var(--primary)";
                document.getElementById('next-btn').style.display = 'block';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                document.getElementById('status-msg').innerText = "❌ Tente novamente";
                document.getElementById('status-msg').style.color = "red";
            }
        };

        async function saveProgress() {
            const user = auth.currentUser;
            if (user) {
                await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m12").set({
                    concluido: true,
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('success-overlay').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
