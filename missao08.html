<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 08</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --if-green: #2f9e41;
            --primary: #00df9a; 
            --secondary: #2a5ff0; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text: #1e293b; 
            --border: #e2e8f0; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 20px; 
            width: 100%; max-width: 480px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .video-container {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--secondary);
            background: #000;
            line-height: 0;
            max-width: 480px;
        }

        .video-container iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .task-header {
            border-left: 4px solid var(--if-green);
            padding-left: 10px;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
        }

        .task-title { color: var(--secondary); font-weight: 800; margin: 0; }
        .instruction { font-size: 0.85rem; color: #64748b; margin: 5px 0 0 0; }

        .quiz-item { 
            margin-bottom: 15px; 
            background: #f1f5f9; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            text-align: left;
        }

        .quiz-item p { margin: 0 0 12px 0; font-size: 0.95rem; font-weight: 500; }
        .highlight { color: var(--secondary); font-weight: 800; }

        select { 
            width: 100%; 
            background: #ffffff; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-weight: 600;
        }

        .btn { 
            width: 100%; 
            padding: 20px; 
            border: none; 
            border-radius: 16px; 
            background: linear-gradient(45deg, var(--secondary), #4f46e5); 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem; 
            margin-top: 10px;
        }

        #success-screen { 
            display: none; position: fixed; inset: 0; background: var(--bg); 
            flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; z-index: 1000; padding: 20px; 
        }
    </style>
</head>
<body>

    <img src="logo-horizontal.jpg" alt="Logo" style="width:180px; margin-bottom:20px;">

    <div class="video-container">
        <iframe src="https://www.youtube-nocookie.com/embed/T4xBL3QeQOU" allowfullscreen></iframe>
    </div>

    <div class="card" id="main-card">
        <div class="task-header">
            <h3 class="task-title">MISSÃO 08: POSSESSIVOS</h3>
            <p class="instruction">Escolha a opção correta para completar a frase:</p>
        </div>

        <div id="quiz-content">
            <div class="quiz-item">
                <p>1. I have a car. <span class="highlight">___</span> car is blue.</p>
                <select id="q1">
                    <option value="">Escolha...</option>
                    <option value="my">MY</option>
                    <option value="your">YOUR</option>
                    <option value="his">HIS</option>
                </select>
            </div>

            <div class="quiz-item">
                <p>2. She has a cat. <span class="highlight">___</span> cat is black.</p>
                <select id="q2">
                    <option value="">Escolha...</option>
                    <option value="her">HER</option>
                    <option value="his">HIS</option>
                    <option value="its">ITS</option>
                </select>
            </div>

            <div class="quiz-item">
                <p>3. The dog has a bone. <span class="highlight">___</span> bone is big.</p>
                <select id="q3">
                    <option value="">Escolha...</option>
                    <option value="her">HER</option>
                    <option value="his">HIS</option>
                    <option value="its">ITS</option>
                </select>
            </div>
        </div>

        <button class="btn" onclick="checkMission()">CONCLUIR MISSÃO 08</button>
    </div>

    <div id="success-screen">
        <h1 style="font-size: 5rem; margin:0;">💎</h1>
        <h2 style="color: var(--secondary); font-size: 2rem;">Missão Cumprida!</h2>
        <p style="color: #64748b;">Seu domínio sobre possessivos está aumentando.</p>
        <button class="btn" style="max-width:280px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Verificação de Acesso (Requer M07)
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            const prevDoc = await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m07").get();
            if (!prevDoc.exists) {
                alert("Você precisa completar a Missão 07 antes!");
                window.location.href = 'index.html';
            }
        });

        async function checkMission() {
            const user = auth.currentUser;
            if (!user) return;

            const r1 = document.getElementById('q1').value;
            const r2 = document.getElementById('q2').value;
            const r3 = document.getElementById('q3').value;

            if (r1 === 'my' && r2 === 'her' && r3 === 'its') {
                try {
                    await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m08").set({
                        concluido: true,
                        data_conclusao: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    document.getElementById('main-card').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'flex';
                } catch (e) {
                    alert("Erro ao salvar progresso.");
                }
            } else {
                alert("Alguma resposta está incorreta. Revise os pronomes possessivos!");
            }
        }
    </script>
</body>
</html>
