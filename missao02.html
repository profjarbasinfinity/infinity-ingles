<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 02</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-analytics-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --if-green: #2f9e41; 
            --primary: #00df9a; 
            --secondary: #2a5ff0; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text: #1e293b; 
            --border: #e2e8f0; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .video-wrapper { 
            position: relative; 
            padding-bottom: 177.77%; /* Formato Vertical Shorts */
            height: 0; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 25px; 
            background: #000; 
            border: 2px solid var(--secondary); 
        }

        .video-wrapper iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .task-title { 
            color: var(--secondary); 
            font-weight: 800; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--if-green); 
            padding-left: 10px; 
        }

        .quiz-item { 
            margin-bottom: 15px; 
            background: #f1f5f9; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
        }

        .quiz-item p { margin: 0 0 10px 0; font-weight: 600; font-size: 0.9rem; }

        select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1; 
            font-family: inherit; 
            background: white;
            color: var(--text);
        }

        .btn { 
            width: 100%; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            background: linear-gradient(45deg, var(--secondary), #4f46e5); 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem; 
        }

        #success-screen { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            z-index: 1000; 
            padding: 20px; 
        }
    </style>
</head>
<body>

    <img src="logo-horizontal.jpg" alt="InFinity Logo" style="width:180px; margin-bottom:20px;">
    
    <div class="card" id="main-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/WJwNE45sN6k" title="Missão 02" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <div class="task-title">MISSÃO 02: FALSE COGNATES</div>
        
        <div class="quiz-item"><p>1. "Actually" significa:</p>
            <select id="q1"><option value="">Selecione...</option><option value="w">Atualmente</option><option value="r">Na verdade</option></select>
        </div>
        <div class="quiz-item"><p>2. "Library" significa:</p>
            <select id="q2"><option value="">Selecione...</option><option value="r">Biblioteca</option><option value="w">Livraria</option></select>
        </div>
        <div class="quiz-item"><p>3. "Parents" significa:</p>
            <select id="q3"><option value="">Selecione...</option><option value="r">Pais</option><option value="w">Parentes</option></select>
        </div>
        <div class="quiz-item"><p>4. "Push" significa:</p>
            <select id="q4"><option value="">Selecione...</option><option value="r">Empurrar</option><option value="w">Puxar</option></select>
        </div>
        <div class="quiz-item"><p>5. "Pretend" significa:</p>
            <select id="q5"><option value="">Selecione...</option><option value="r">Fingir</option><option value="w">Pretender</option></select>
        </div>

        <p style="font-weight: 800; font-size: 0.8rem; margin-bottom: 5px; color: var(--secondary);">BÔNUS: Artigos Indefinidos</p>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="a1"><option value="">P (Consonantal)...</option><option value="p">A</option><option value="l">AN</option></select>
            <select id="a2"><option value="">L (Vocalic)...</option><option value="p">A</option><option value="l">AN</option></select>
        </div>

        <button class="btn" onclick="checkMission()">CONCLUIR MISSÃO 02</button>
    </div>

    <div id="success-screen">
        <h1 style="font-size: 5rem; margin:0;">🎯</h1>
        <h2 style="color: var(--secondary);">Incrível!</h2>
        <p>Seu progresso na Missão 02 foi salvo com sucesso.</p>
        <button class="btn" style="max-width:280px; margin-top:20px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef",
            measurementId: "G-3EKYW8RVBQ"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const analytics = firebase.analytics();
        const adminEmail = "jarbas.lima@ifpb.edu.br";

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            analytics.logEvent('mission_start', { id: '02' });
        });

        async function checkMission() {
            const user = auth.currentUser;
            if (!user) return;

            const q1 = document.getElementById('q1').value;
            const q2 = document.getElementById('q2').value;
            const q3 = document.getElementById('q3').value;
            const q4 = document.getElementById('q4').value;
            const q5 = document.getElementById('q5').value;
            const a1 = document.getElementById('a1').value;
            const a2 = document.getElementById('a2').value;

            // Gabarito: r = Right, p = A (antes de som de consoante), l = AN (antes de som de vogal)
            if (q1 === 'r' && q2 === 'r' && q3 === 'r' && q4 === 'r' && q5 === 'r' && a1 === 'p' && a2 === 'l') {
                try {
                    await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m02").set({
                        concluido: true,
                        data_conclusao: firebase.firestore.FieldValue.serverTimestamp(),
                        data_formatada: new Date().toLocaleDateString()
                    });

                    analytics.logEvent('mission_complete', { id: '02' });
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    document.getElementById('main-card').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'flex';
                } catch (error) {
                    console.error(error);
                    alert("Erro ao salvar progresso.");
                }
            } else {
                analytics.logEvent('mission_error', { id: '02' });
                alert("Ops! Alguma resposta está incorreta. Revise o vídeo!");
            }
        }
    </script>
</body>
</html>
