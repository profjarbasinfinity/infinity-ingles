<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 12</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        :root { --if-green: #2f9e41; --primary: #00df9a; --secondary: #2a5ff0; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo-img { width: 180px; margin: 20px 0; }
        
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; width: 100%; max-width: 500px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        
        .video-wrapper { position: relative; padding-bottom: 177.78%; height: 0; border-radius: 16px; overflow: hidden; margin-bottom: 25px; border: 2px solid var(--secondary); background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .task-title { color: var(--secondary); font-weight: 800; margin-bottom: 8px; font-size: 1.1rem; text-transform: uppercase; }
        
        .word-display { font-size: 2.8rem; font-weight: 800; color: var(--secondary); margin: 20px 0; background: #f1f5f9; padding: 20px; border-radius: 16px; border: 2px solid var(--border); letter-spacing: 2px; }
        
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--secondary); color: white; cursor: pointer; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: 0.3s; box-shadow: 0 6px 20px rgba(42, 95, 240, 0.3); }
        .mic-btn.recording { background: #ef4444; animation: pulse 1.5s infinite; box-shadow: 0 0 25px rgba(239, 68, 68, 0.5); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .status { margin-top: 20px; font-weight: 600; min-height: 24px; transition: 0.3s; }
        .status.success { color: var(--if-green); }
        .status.error { color: #ef4444; }

        .btn-finish { display: none; width: 100%; padding: 20px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--secondary), #4f46e5); color: #ffffff; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        
        #success-screen { display: none; position: fixed; inset: 0; background: #ffffff; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <img src="logo-horizontal.jpg" alt="InFinity Logo" class="logo-img">

    <div class="card" id="main-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube-nocookie.com/embed/n2VSL7V4wvQ" allowfullscreen></iframe>
        </div>

        <div class="task-title">MISSÃO 12: O SOPRO DO TH</div>
        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 20px;">Toque no microfone e pronuncie a palavra em destaque:</p>
        
        <div id="target-word" class="word-display">THINK</div>
        
        <button id="mic-btn" class="mic-btn" onclick="startSpeech()">🎤</button>
        <div class="status" id="status">Aguardando microfone...</div>
        
        <button id="finish-btn" class="btn-finish" onclick="completeMission()">ENCERRAR MISSÃO 12</button>
    </div>

    <div id="success-screen">
        <h1 style="font-size: 5rem; margin: 0;">🌬️</h1>
        <h2 style="color: var(--secondary); font-size: 1.8rem;">PRONÚNCIA IMPECÁVEL!</h2>
        <p>Você dominou o som mais icônico do inglês.</p>
        <button class="btn-finish" style="display: block; width:240px; margin-top: 20px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const words = ["THINK", "THEY", "BIRTHDAY", "FATHER", "THROUGH"];
        let currentIdx = 0;

        // Configuração Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
        } else {
            document.getElementById('status').innerText = "Seu navegador não suporta reconhecimento de voz.";
            document.getElementById('mic-btn').style.display = "none";
        }

        // Verificação de Acesso
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const prevDoc = await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m11").get();
            if (!prevDoc.exists) {
                alert("Conclua a Missão 11 primeiro!");
                window.location.href = 'index.html';
            }
        });

        function startSpeech() {
            if (!recognition) return;
            recognition.start();
            document.getElementById('mic-btn').classList.add('recording');
            document.getElementById('status').innerText = "Ouvindo...";
            document.getElementById('status').className = "status";
        }

        if (recognition) {
            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript.toUpperCase();
                const target = words[currentIdx];
                document.getElementById('mic-btn').classList.remove('recording');
                
                // Verifica se a palavra dita contém o alvo
                if (result.includes(target) || result === target) {
                    confetti({ particleCount: 50, spread: 50, origin: { y: 0.8 } });
                    currentIdx++;
                    
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = "✔️ Excelente!";
                    statusEl.className = "status success";

                    if (currentIdx < words.length) {
                        setTimeout(() => {
                            document.getElementById('target-word').innerText = words[currentIdx];
                            statusEl.innerText = "Próxima palavra...";
                        }, 1000);
                    } else {
                        document.getElementById('target-word').innerText = "DONE!";
                        document.getElementById('mic-btn').style.display = "none";
                        document.getElementById('finish-btn').style.display = "block";
                    }
                } else {
                    const statusEl = document.getElementById('status');
                    statusEl.innerText = "❌ Entendi '" + result + "'. Tente de novo!";
                    statusEl.className = "status error";
                }
            };

            recognition.onerror = () => {
                document.getElementById('mic-btn').classList.remove('recording');
                document.getElementById('status').innerText = "Erro ao ouvir. Tente novamente.";
            };
        }

        async function completeMission() {
            const user = auth.currentUser;
            if (user) {
                try {
                    await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m12").set({
                        concluido: true,
                        data_conclusao: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    document.getElementById('main-card').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'flex';
                    confetti({ particleCount: 150, spread: 70 });
                } catch (e) {
                    alert("Erro ao salvar progresso.");
                }
            }
        }
    </script>
</body>
</html>
