<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 02</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        :root { --if-green: #2f9e41; --primary: #00df9a; --secondary: #2a5ff0; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; width: 100%; max-width: 480px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .video-wrapper { position: relative; padding-bottom: 177.77%; height: 0; border-radius: 12px; overflow: hidden; margin-bottom: 25px; background: #000; border: 2px solid var(--secondary); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .task-title { color: var(--secondary); font-weight: 800; margin-bottom: 10px; border-left: 4px solid var(--if-green); padding-left: 10px; }
        .quiz-item { margin-bottom: 15px; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .quiz-item p { margin: 0 0 10px 0; font-weight: 600; font-size: 0.9rem; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; }
        .btn { width: 100%; padding: 20px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--secondary), #4f46e5); color: white; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        #success-screen { display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 1000; padding: 20px; }
    </style>
</head>
<body>
    <img src="logo-horizontal.jpg" alt="InFinity Logo" style="width:180px; margin-bottom:20px;">
    <div class="card" id="main-card">
        <div class="video-wrapper"><iframe src="https://www.youtube-nocookie.com/embed/S2Y8I_yS6fM" allowfullscreen></iframe></div>
        <div class="task-title">MISSÃO 02: FALSE COGNATES</div>
        <div class="quiz-item"><p>1. "Actually" significa:</p><select id="q1"><option value="">Selecione...</option><option value="wrong">Atualmente</option><option value="right">Na verdade</option></select></div>
        <div class="quiz-item"><p>2. "Library" significa:</p><select id="q2"><option value="">Selecione...</option><option value="right">Biblioteca</option><option value="wrong">Livraria</option></select></div>
        <div class="quiz-item"><p>3. "Parents" significa:</p><select id="q3"><option value="">Selecione...</option><option value="right">Pais</option><option value="wrong">Parentes</option></select></div>
        <div class="quiz-item"><p>4. "Push" significa:</p><select id="q4"><option value="">Selecione...</option><option value="right">Empurrar</option><option value="wrong">Puxar</option></select></div>
        <div class="quiz-item"><p>5. "Pretend" significa:</p><select id="q5"><option value="">Selecione...</option><option value="right">Fingir</option><option value="wrong">Pretender</option></select></div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="a1"><option value="">Artigo P...</option><option value="p">A</option><option value="l">AN</option></select>
            <select id="a2"><option value="">Artigo L...</option><option value="p">A</option><option value="l">AN</option></select>
        </div>
        <button class="btn" onclick="checkMission()">CONCLUIR MISSÃO 02</button>
    </div>
    <div id="success-screen"><h1>🎯</h1><h2 style="color: var(--secondary);">Incrível!</h2><p>Missão 02 concluída.</p><button class="btn" style="max-width:280px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button></div>

    <script>
        const MISSION_ID = '02';
        const PREVIOUS_MISSION_ID = '01';
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziLkmSI-S9wRb2lb8PTjyU0L4naMQfbtor0a3MGdkHaULM_CvwTxkQDq3ojgrqAnDX/exec";

        function checkAccess() {
            const completedPrev = localStorage.getItem('m' + PREVIOUS_MISSION_ID + '_complete');
            const lastMissionDate = localStorage.getItem('last_mission_date');
            const now = new Date().getTime();
            if (!completedPrev) { alert("Acesso negado! Conclua a Missão 01 primeiro."); window.location.href = 'index.html'; return; }
            if (lastMissionDate && !localStorage.getItem('m' + MISSION_ID + '_complete')) {
                const diff = now - parseInt(lastMissionDate);
                const waitTime = 24 * 60 * 60 * 1000;
                if (diff < waitTime) {
                    const hours = Math.floor((waitTime - diff) / (1000 * 60 * 60));
                    const mins = Math.floor(((waitTime - diff) % (1000 * 60 * 60)) / (1000 * 60));
                    alert(`Aguarde! A Missão 02 libera em ${hours}h ${mins}min.`);
                    window.location.href = 'index.html';
                }
            }
        }
        checkAccess();

        function checkMission() {
            if(document.getElementById('q1').value==='right' && document.getElementById('q2').value==='right' && document.getElementById('q3').value==='right' && document.getElementById('q4').value==='right' && document.getElementById('q5').value==='right' && document.getElementById('a1').value==='p' && document.getElementById('a2').value==='l') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                localStorage.setItem('m' + MISSION_ID + '_complete', 'true');
                localStorage.setItem('last_mission_date', new Date().getTime().toString());
                sendToSheet();
            } else { alert("Verifique suas respostas!"); }
        }

        function sendToSheet() {
            const alunoData = JSON.parse(localStorage.getItem('aluno_infinity')) || JSON.parse(localStorage.getItem('user_data'));
            if (alunoData) {
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
                    nome: alunoData.nome, turma: alunoData.turma, curso: alunoData.curso, email: alunoData.email, missao: "Missão 02 - Falsos Cognatos"
                })});
            }
        }
    </script>
</body>
</html>
