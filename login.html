<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InFinity | Portal de Acesso</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        :root { --primary: #00df9a; --secondary: #2a5ff0; --bg: #050816; --card: #ffffff; }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-card { background: var(--card); padding: 35px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .logo { width: 150px; margin-bottom: 20px; }
        h2 { color: var(--secondary); margin-bottom: 5px; font-weight: 800; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: 700; color: var(--secondary); margin-left: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: 'Poppins'; }

        #registration-fields { display: none; border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-auth { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .toggle-link { margin-top: 15px; display: block; font-size: 0.8rem; color: var(--secondary); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo-horizontal.jpg" alt="Logo" class="logo">
        <h2 id="title">Welcome</h2>
        <p id="subtitle" class="subtitle">Acesse sua área de missões.</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Senha (mín. 6 dígitos)">
        </div>

        <div id="registration-fields">
            <div class="input-group">
                <input type="text" id="nomeCompleto" placeholder="Nome Completo">
            </div>
            <div class="input-group">
                <label>Modalidade</label>
                <select id="modalidade">
                    <option value="Integrado">Integrado</option>
                    <option value="Subsequente">Subsequente</option>
                    <option value="Superior">Superior</option>
                    <option value="Externo">Visitante</option>
                </select>
            </div>
            <div class="input-group">
                <label>Curso</label>
                <select id="curso">
                    <option value="Informática">Informática</option>
                    <option value="Eletrotécnica">Eletrotécnica</option>
                    <option value="Edificações">Edificações</option>
                    <option value="Segurança">Segurança no Trabalho</option>
                    <option value="Engenharia">Engenharia Civil</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ano/Período</label>
                <select id="periodo">
                    <option value="1">1º Ano / Período</option>
                    <option value="2">2º Ano / Período</option>
                    <option value="3">3º Ano / Período</option>
                </select>
            </div>
        </div>
        
        <button class="btn-auth" id="btn-main" onclick="handleAuth()">ENTRAR</button>
        <span class="toggle-link" id="toggle-text" onclick="toggleMode()">Não tem conta? Cadastre-se aqui</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isRegistering = false;

        function toggleMode() {
            isRegistering = !isRegistering;
            document.getElementById('registration-fields').style.display = isRegistering ? 'block' : 'none';
            document.getElementById('title').innerText = isRegistering ? 'Criar Conta' : 'Welcome';
            document.getElementById('btn-main').innerText = isRegistering ? 'FINALIZAR CADASTRO' : 'ENTRAR';
            document.getElementById('toggle-text').innerText = isRegistering ? 'Já tenho conta? Fazer Login' : 'Não tem conta? Cadastre-se aqui';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!isRegistering) {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    window.location.href = "index.html";
                } catch (e) { alert("Erro: Usuário não encontrado ou senha incorreta."); }
            } else {
                const nome = document.getElementById('nomeCompleto').value;
                if (!nome) { alert("Preencha seu nome!"); return; }
                
                try {
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection("usuarios").doc(res.user.uid).set({
                        nome: nome,
                        email: email,
                        modalidade: document.getElementById('modalidade').value,
                        curso: document.getElementById('curso').value,
                        periodo: document.getElementById('periodo').value,
                        isAdmin: email === "jarbas.lima@ifpb.edu.br"
                    });
                    window.location.href = "index.html";
                } catch (e) { alert("Erro ao cadastrar: " + e.message); }
            }
        }
    </script>
</body>
</html>
