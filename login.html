<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InFinity | Portal de Acesso</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --primary: #00df9a; 
            --secondary: #2a5ff0; 
            --bg: #f8fafc; 
            --text: #1e293b; 
            --border: #e2e8f0;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .login-card { 
            background: white; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid var(--border);
        }

        .logo { width: 160px; margin-bottom: 20px; }
        
        h2 { color: var(--secondary); margin: 0 0 5px 0; font-weight: 800; }
        p.subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--secondary); margin-bottom: 5px; margin-left: 5px; }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            font-size: 0.9rem;
            transition: 0.3s;
            background-color: #fcfdfe;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(42, 95, 240, 0.1);
        }

        /* Estilo para os campos de cadastro que surgem depois */
        #registration-fields { 
            display: none; 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 2px dashed var(--border);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-auth { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--secondary), #4f46e5); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(42, 95, 240, 0.3);
            transition: 0.3s;
        }

        .btn-auth:hover { transform: translateY(-2px); opacity: 0.95; }

        .info-footer { font-size: 0.7rem; color: #94a3b8; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo-horizontal.jpg" alt="InFinity Logo" class="logo">
        <h2 id="auth-title">Welcome!</h2>
        <p id="auth-subtitle" class="subtitle">Insira seus dados para começar.</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Senha (mínimo 6 dígitos)">
        </div>

        <div id="registration-fields">
            <div class="input-group">
                <input type="text" id="nomeCompleto" placeholder="Nome Completo">
            </div>
            
            <div class="input-group">
                <label>Modalidade</label>
                <select id="modalidade">
                    <option value="Integrado">Integrado</option>
                    <option value="Subsequente">Subsequente</option>
                    <option value="Superior">Superior</option>
                    <option value="Visitante">Sou Visitante (Externo)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Curso</label>
                <select id="curso">
                    <option value="Informática">Informática</option>
                    <option value="Eletrotécnica">Eletrotécnica</option>
                    <option value="Edificações">Edificações</option>
                    <option value="Segurança no Trabalho">Segurança no Trabalho</option>
                    <option value="Engenharia Civil">Engenharia Civil</option>
                    <option value="Visitante">Visitante / Nenhum</option>
                </select>
            </div>

            <div class="input-group">
                <label>Ano ou Período</label>
                <select id="periodo">
                    <option value="1º Ano">1º Ano</option>
                    <option value="2º Ano">2º Ano</option>
                    <option value="3º Ano">3º Ano</option>
                    <option value="1º Período">1º Período</option>
                    <option value="2º Período">2º Período</option>
                    <option value="Turma de Engenharia">Turma de Engenharia Civil</option>
                    <option value="Visitante">Visitante / Nenhum</option>
                </select>
            </div>

            <div class="input-group">
                <label>Turma</label>
                <select id="turma">
                    <option value="Única">Única (Aluno IF)</option>
                    <option value="Turma A">Turma A</option>
                    <option value="Turma B">Turma B</option>
                    <option value="Visitante">Visitante / Externo</option>
                </select>
            </div>
        </div>
        
        <button class="btn-auth" id="btn-main" onclick="handleAuth()">ENTRAR NA PLATAFORMA</button>
        
        <p class="info-footer">
            Se for seu primeiro acesso, o sistema abrirá automaticamente os campos de cadastro após você clicar no botão.
        </p>
    </div>

    <script>
        // Configurações do Firebase (Suas credenciais mantidas)
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isRegistrationMode = false;

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                alert("Por favor, insira um e-mail válido e uma senha de no mínimo 6 caracteres.");
                return;
            }

            if (!isRegistrationMode) {
                // TENTATIVA DE LOGIN NORMAL
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    window.location.href = "index.html";
                } catch (error) {
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        // Se não achar o usuário, assume-se que é um novo aluno
                        showRegistrationFields();
                    } else {
                        alert("Erro ao acessar: " + error.message);
                    }
                }
            } else {
                // MODO CADASTRO - SALVAR NO FIRESTORE
                const nome = document.getElementById('nomeCompleto').value.trim();
                const modalidade = document.getElementById('modalidade').value;
                const curso = document.getElementById('curso').value;
                const periodo = document.getElementById('periodo').value;
                const turma = document.getElementById('turma').value;

                if (!nome) {
                    alert("Por favor, preencha seu nome completo para o certificado.");
                    return;
                }

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Criar documento do aluno com os filtros detalhados
                    await db.collection("usuarios").doc(user.uid).set({
                        nome: nome,
                        email: email,
                        modalidade: modalidade,
                        curso: curso,
                        periodo: periodo,
                        turma: turma,
                        dataCadastro: firebase.firestore.FieldValue.serverTimestamp(),
                        tipo: modalidade === "Visitante" ? "Externo" : "Aluno IFPB"
                    });

                    alert("Cadastro realizado com sucesso! Bem-vindo à InFinity.");
                    window.location.href = "index.html";
                } catch (error) {
                    alert("Erro ao criar conta: " + error.message);
                }
            }
        }

        function showRegistrationFields() {
            isRegistrationMode = true;
            document.getElementById('registration-fields').style.display = 'block';
            document.getElementById('auth-title').innerText = "Novo Cadastro";
            document.getElementById('auth-subtitle').innerText = "Complete seu perfil educacional.";
            document.getElementById('btn-main').innerText = "CONCLUIR E ENTRAR";
            
            // Rola a tela para baixo suavemente para mostrar os novos campos
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
