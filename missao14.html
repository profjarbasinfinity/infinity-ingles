<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InFinity | Missão 14</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        :root { 
            --primary: #00df9a; 
            --secondary: #2a5ff0; 
            --bg: #050816; 
            --card-bg: #101630; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            width: 100%; 
            max-width: 600px; 
            border: 1px solid #1e293b; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .video-wrapper { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            border-radius: 12px; overflow: hidden; margin-bottom: 20px; 
            border: 1px solid var(--secondary); 
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .step-container { 
            background: #161d3a; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 1px solid #2a5ff044; 
        }
        
        .eng-text { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 1.2rem; 
            display: block; 
            margin-bottom: 10px; 
            text-align: center; 
        }
        
        .tech-selector { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .tech-tag { 
            padding: 6px 14px; border: 1px solid #4a5568; border-radius: 20px; font-size: 0.75rem; 
            cursor: pointer; transition: 0.3s; background: #0a1025; color: #94a3b8;
        }
        .tech-tag.active { background: var(--secondary); border-color: white; color: white; font-weight: bold; }

        .answer-zone { 
            min-height: 55px; border: 2px dashed var(--secondary); 
            border-radius: 12px; display: flex; flex-wrap: wrap; gap: 8px; 
            justify-content: center; padding: 12px; margin: 15px 0; 
            background: rgba(42, 95, 240, 0.05);
        }
        
        .word-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .word-btn { 
            padding: 10px 16px; background: white; color: black; 
            border-radius: 8px; border: none; font-weight: 600; 
            cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .word-btn:active { transform: scale(0.95); }

        .btn-verify { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; 
        }

        #success-screen { 
            display: none; position: fixed; inset: 0; background: var(--bg); 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <img src="logo-horizontal.jpg" alt="Logo InFinity" style="width:180px; margin: 20px;">

    <div class="card" id="main-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/aHVET_AjUdI" allowfullscreen></iframe>
        </div>

        <h3 style="color: var(--primary); text-align: center; margin-top: 0;">MISSÃO 14: ADAPTAÇÕES SIMULTÂNEAS</h3>
        <p style="font-size: 0.85rem; color: #94a3b8; text-align: center; margin-bottom: 25px;">
            Analise a manchete e aplique as múltiplas técnicas explicadas pelo Professor Jarbas.
        </p>

        <div id="quiz-box">
            </div>

        <button class="btn-verify" id="main-btn" onclick="checkStep()">VERIFICAR E AVANÇAR</button>
    </div>

    <div id="success-screen">
        <h1 style="font-size: 5rem; margin-bottom: 10px;">🧠</h1>
        <h2 style="color: var(--primary);">PENSAMENTO MULTINÍVEL!</h2>
        <p style="max-width: 300px; line-height: 1.5;">Você destrinchou a manchete como um profissional de tradução.</p>
        <button class="btn-verify" style="width: 250px;" onclick="location.href='index.html'">VOLTAR AO MAPA</button>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC74EL1UJqTimRcCl888splwqqw2U3SLTs",
            authDomain: "infinity-ingles.firebaseapp.com",
            projectId: "infinity-ingles",
            storageBucket: "infinity-ingles.firebasestorage.app",
            messagingSenderId: "83199259838",
            appId: "1:83199259838:web:f99e2a72d21b7bed421aef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. MONITOR DE ACESSO E MODO DEUS
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            // MODALIDADE MESTRE
            if (user.email === "jarbas.lima@ifpb.edu.br") {
                renderStep(); 
                return; 
            }

            // Alunos: Verificam Missão 13
            const prevDoc = await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m13").get();
            if (!prevDoc.exists) {
                alert("Você precisa completar a Missão 13 primeiro!");
                window.location.href = 'index.html';
            } else {
                renderStep();
            }
        });

        // 2. DADOS DA MISSÃO
        const steps = [
            {
                eng: "Breaking News",
                pool: ['Plantão', 'Quebrantes', 'Notícias', 'Urgente'],
                correct: 'Plantão',
                techs: ['Retextualização']
            },
            {
                eng: "United Nations officials",
                pool: ['oficiais', 'das', 'Nações', 'Unidas', 'unidas', 'nações'],
                correct: 'oficiais das Nações Unidas',
                techs: ['Reordenação', 'Adição']
            },
            {
                eng: "long-term negotiations",
                pool: ['negociações', 'de', 'longo', 'prazo', 'termo'],
                correct: 'negociações de longo prazo',
                techs: ['Reordenação', 'Adição', 'Retextualização']
            }
        ];

        let currentStep = 0;
        let selectedTechs = new Set();

        // 3. RENDERIZAÇÃO
        function renderStep() {
            const s = steps[currentStep];
            const container = document.getElementById('quiz-box');
            selectedTechs.clear();
            
            container.innerHTML = `
                <div class="step-container">
                    <span class="eng-text">"${s.eng}"</span>
                    
                    <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin: 10px 0 5px 0;">Quais técnicas são necessárias aqui?</p>
                    <div class="tech-selector">
                        ${['Adição', 'Supressão', 'Reordenação', 'Retextualização'].map(t => 
                            `<div class="tech-tag" onclick="toggleTech(this, '${t}')">${t}</div>`
                        ).join('')}
                    </div>

                    <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin: 15px 0 5px 0;">Monte a tradução ideal:</p>
                    <div class="answer-zone" id="ans-zone"></div>
                    <div class="word-pool" id="pool-zone">
                        ${s.pool.sort(() => Math.random() - 0.5).map(w => 
                            `<button class="word-btn" onclick="moveWord(this)">${w}</button>`
                        ).join('')}
                    </div>
                </div>
            `;
        }

        function toggleTech(el, tech) {
            el.classList.toggle('active');
            if(selectedTechs.has(tech)) selectedTechs.delete(tech);
            else selectedTechs.add(tech);
        }

        function moveWord(btn) {
            const ans = document.getElementById('ans-zone');
            const pool = document.getElementById('pool-zone');
            if(btn.parentElement === pool) ans.appendChild(btn);
            else pool.appendChild(btn);
        }

        // 4. VERIFICAÇÃO E SALVAMENTO
        async function checkStep() {
            const s = steps[currentStep];
            const userPhrase = Array.from(document.getElementById('ans-zone').children).map(b => b.innerText).join(' ');
            
            // Verifica se as técnicas marcadas batem exatamente com o gabarito
            const techCorrect = s.techs.every(t => selectedTechs.has(t)) && selectedTechs.size === s.techs.length;
            
            if(userPhrase.toLowerCase() === s.correct.toLowerCase() && techCorrect) {
                confetti({ particleCount: 50, spread: 40 });
                currentStep++;
                
                if(currentStep < steps.length) {
                    renderStep();
                } else {
                    await saveAndFinish();
                }
            } else {
                alert("Atenção! Verifique se selecionou exatamente as técnicas corretas e se a ordem das palavras está perfeita.");
            }
        }

        async function saveAndFinish() {
            const user = auth.currentUser;
            if (user) {
                await db.collection("progresso").doc(user.uid).collection("concluidas").doc("m14").set({
                    concluido: true,
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
